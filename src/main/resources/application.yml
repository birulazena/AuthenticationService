spring:
  application:
    name: auth-service
  liquibase:
    change-log: classpath:db/changelog-master.yml
  jpa:
    generate-ddl: false
    show-sql: true
security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: ${JWT_ACCESS_EXP}
    refresh-expiration: ${JWT_REFRESH_EXP}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTLP_METRICS_URL}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACES_URL}
    logging:
      export:
        otlp:
          endpoint: ${OTLP_LOGS_URL}