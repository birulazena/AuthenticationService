services:
  postgres:
    image: postgres:17.5
    environment:
      - POSTGRES_DB=auth_service_db_docker
      - POSTGRES_USER=auth_service_db_name_docker
      - POSTGRES_PASSWORD=auth_service_db_password_docker
    ports:
      - "5433:5432"
    volumes:
      - auth_db:/var/lib/postgresql/data

  authentication-service-app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXP=${JWT_ACCESS_EXP}
      - JWT_REFRESH_EXP=${JWT_REFRESH_EXP}

volumes:
  auth_db: